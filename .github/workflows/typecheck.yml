name: Type Check

on:
  push:
    branches: [main, fix]
  pull_request:
    branches: [main]

jobs:
  typecheck-node:
    name: Node.js + @types/node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd test-node && npm install
      - name: Apply fix (fix branch only)
        if: github.ref == 'refs/heads/fix'
        run: patch -p1 -d test-node/node_modules/happy-dom < patches/happy-dom@20.8.3.patch
      - run: cd test-node && npx tsc --noEmit

  typecheck-bun:
    name: Bun + bun-types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd test-bun && npm install
      - name: Apply fix (fix branch only)
        if: github.ref == 'refs/heads/fix'
        run: patch -p1 -d test-bun/node_modules/happy-dom < patches/happy-dom@20.8.3.patch
      - run: cd test-bun && npx tsc --noEmit

  typecheck-dom:
    name: Browser (lib.dom)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: cd test-deno && npm install
      - name: Apply fix (fix branch only)
        if: github.ref == 'refs/heads/fix'
        run: patch -p1 -d test-deno/node_modules/happy-dom < patches/happy-dom@20.8.3.patch
      - run: cd test-deno && npx tsc --noEmit
